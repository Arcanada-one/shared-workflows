# Reusable deploy workflow for Arcanada ecosystem static / PHP sites.
# Source of truth: INFRA-0302 (parent INFRA-0299). Consumed cross-org via a
# thin per-site caller. Atomic install = temp-dir + double mv (NOT symlink-swap:
# php-fpm opcache caches by realpath; symlink-swap would need an fpm reload that
# is not in the ci-runner sudoers). See
# datarim/creative/creative-INFRA-0299-architecture-atomic-deploy.md.
name: deploy-static-site

on:
  workflow_call:
    inputs:
      domain:
        description: Public domain (Host header for the health check).
        required: true
        type: string
      webroot:
        description: Server webroot directory under /var/www (may differ from domain).
        required: true
        type: string
      build:
        description: Optional build command run before install (e.g. "npm run build:css").
        required: false
        type: string
        default: ""
      health_scheme:
        description: Scheme for the post-deploy health probe (http or https).
        required: false
        type: string
        default: http
    secrets:
      # Declared optional so a caller MAY pass them explicitly; `secrets: inherit`
      # in the caller also satisfies these. Both the CF cache purge and the Ops Bot
      # notification are opt-in and fail-soft when the corresponding secret is
      # absent, so a caller that provides none still deploys green.
      CF_API_TOKEN:
        description: Cloudflare API token (Cache Purge:Purge) for the post-deploy cache purge. Optional.
        required: false
      OPSBOT_URL:
        description: Ops Bot events endpoint for failure notifications. Optional.
        required: false
      OPSBOT_KEY:
        description: Ops Bot bearer token for failure notifications. Optional.
        required: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, arcana-www, sites]
    concurrency:
      # Per-domain serialization; never cancel a deploy mid-flight — an
      # interrupted rsync/mv leaves the webroot in a torn state.
      group: deploy-${{ inputs.domain }}
      cancel-in-progress: false
    steps:
      - name: Checkout site content
        uses: actions/checkout@v4

      - name: Optional build step
        if: inputs.build != ''
        run: ${{ inputs.build }}

      - name: Footer build-stamp (build-info.php)
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Parity with Projects/Websites/deploy.sh write_build_stamp: stamp the
          # short HEAD SHA of THIS site repo into build-info.php so the footer can
          # render it and the ecosystem drift detector (check-repo-site-sync.sh)
          # can spot a stale site. Under gh-actions the site repo IS the source of
          # truth for the deployed payload, so ${GITHUB_SHA} (this repo's commit)
          # is the correct stamp — not a cross-repo source SHA. Written into the
          # checked-out tree BEFORE the atomic install so it ships in the payload.
          # File is intentionally NOT committed (gitignored in the site repo); it
          # is regenerated on every deploy. `$config['build_sha']` mirrors the
          # deploy.sh contract exactly so the footer template needs no change.
          sha="${GITHUB_SHA::8}"
          cat > build-info.php <<PHP
          <?php // build-stamp ${sha} -- auto-generated by deploy-static-site.yml, do not commit
          \$config['build_sha'] = '${sha}';
          PHP

      - name: Atomic install (temp-dir + double mv)
        env:
          WEBROOT: ${{ inputs.webroot }}
        run: |
          set -euo pipefail
          # WEBROOT is a fixed value resolved from the deploy.sh resolve_webroot
          # table by the caller — not free user input (Security Mandate S5).
          dst="/var/www/${WEBROOT}"
          sha="${GITHUB_SHA::8}"
          next="${dst}.next.${sha}"
          rsync -a --delete --exclude='.git' --exclude='.github' ./ "${next}/"
          if [ -d "${dst}" ]; then
            # Retire the previous webroot by RENAME, never rm -rf, so a stale
            # ${dst}.old owned by a different uid (legacy deploy.sh ran under root;
            # the runner is ci-runner without sudo) cannot block the deploy with
            # "rm: Permission denied" on files the runner does not own. mv only
            # needs write on the parent dir (/var/www, ACL-granted to ci-runner) —
            # not ownership of the tree's contents. The stamped ${sha} makes the
            # retired name unique so concurrent-safe and idempotent on re-run.
            # A separate janitor (cron, www-data) reaps ${dst}.old.* — the deploy
            # path never deletes foreign-owned trees. On rollback the health-check
            # step restores from the most recent ${dst}.old.* (see below).
            rm -rf "${dst}.old.${sha}" 2>/dev/null || true
            mv "${dst}" "${dst}.old.${sha}"
          fi
          mv "${next}" "${dst}"

      - name: Health check with rollback
        env:
          DOMAIN: ${{ inputs.domain }}
          WEBROOT: ${{ inputs.webroot }}
          SCHEME: ${{ inputs.health_scheme }}
        run: |
          set -euo pipefail
          dst="/var/www/${WEBROOT}"
          # -L follows redirects: sites with a language/canonical redirect
          # (e.g. `/` -> `/en/`) return 301/302 on `/`; the healthy signal is
          # the FINAL 2xx after the chain, not the first hop. %{http_code} with
          # -L reports the last response's code. --resolve pins both :80 and
          # :443 to loopback so the probe hits this host regardless of scheme.
          # -k (insecure): this probe bypasses the CDN by resolving to 127.0.0.1,
          # so it reaches the ORIGIN nginx directly and sees the origin cert
          # (a Cloudflare origin cert / self-signed, not a publicly-trusted
          # chain). The probe's job is to confirm the LOCAL webroot serves a 2xx,
          # not to validate the edge TLS chain — Cloudflare owns edge TLS. Without
          # -k, an http:// start that 301-redirects to https:// fails cert
          # verification on loopback (curl 60) even though the site is healthy.
          code="$(curl -fsSLk -o /dev/null -w '%{http_code}' \
            --resolve "${DOMAIN}:80:127.0.0.1" \
            --resolve "${DOMAIN}:443:127.0.0.1" \
            "${SCHEME}://${DOMAIN}/" || echo 000)"
          # Accept any final 2xx (200/204/etc). A 3xx here means -L stopped on a
          # redirect it could not follow (e.g. off-host Location) — treat as
          # unhealthy and roll back.
          if [ "${code}" -lt 200 ] || [ "${code}" -ge 300 ]; then
            echo "::error::health check returned ${code} for ${DOMAIN} — rolling back"
            # Restore from the most recent retired webroot. The install step now
            # retires by rename to ${dst}.old.<sha> (never rm -rf), so pick the
            # newest by mtime. Move the just-installed (broken) tree aside by
            # rename too — never rm -rf it, in case it is foreign-owned; a janitor
            # reaps ${dst}.broken.* / ${dst}.old.* later. If no retired webroot
            # exists (first-ever deploy), there is nothing to roll back to; leave
            # the deploy in place and fail the run so the operator is alerted.
            # Newest retired webroot by mtime; find+sort handles any filename and
            # satisfies shellcheck SC2012. The suffix is a hex sha, so this is
            # a controlled glob, but find keeps it robust.
            prev="$(find /var/www -maxdepth 1 -type d -name "$(basename "${dst}").old.*" -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2- || true)"
            if [ -n "${prev}" ] && [ -d "${prev}" ]; then
              [ -d "${dst}" ] && mv "${dst}" "${dst}.broken.$(date +%s 2>/dev/null || echo x)" 2>/dev/null || true
              mv "${prev}" "${dst}"
            fi
            exit 1
          fi
          echo "health check OK (${code}) for ${DOMAIN}"

      - name: Cloudflare cache purge (opt-in)
        env:
          DOMAIN: ${{ inputs.domain }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          # Parity with Projects/Websites/deploy.sh Cloudflare purge: after the
          # origin is updated, Cloudflare keeps serving cached HTML until the edge
          # cache expires. Purge the deployed domain's zone so direct links reflect
          # the deploy immediately. Opt-in and fail-soft, mirroring deploy.sh: if
          # CF_API_TOKEN is unset (secret not provisioned on the runner/org), or
          # the domain is not a CF zone, the purge is SKIPPED with a note — the
          # deploy itself already succeeded and the edge cache self-expires. This
          # keeps migration unblocked when the CF secret is not yet in place.
          # Runs only after a green health check (this step is unreached on rollback).
          if [ -z "${CF_API_TOKEN:-}" ]; then
            echo "NOTE: CF_API_TOKEN secret not set — skipping Cloudflare cache purge (edge self-expires)."
            exit 0
          fi
          zone="$(curl -s --max-time 20 \
            "https://api.cloudflare.com/client/v4/zones?name=${DOMAIN}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            | grep -o '"id":"[0-9a-f]\{32\}"' | head -1 | cut -d'"' -f4)"
          if [ -z "${zone}" ]; then
            echo "NOTE: ${DOMAIN} is not a Cloudflare zone (or lookup failed) — skipping purge."
            exit 0
          fi
          echo "Purging Cloudflare cache for ${DOMAIN} (zone ${zone}) ..."
          resp="$(curl -s --max-time 30 -X POST \
            "https://api.cloudflare.com/client/v4/zones/${zone}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')"
          if echo "${resp}" | grep -q '"success":true'; then
            echo "Cloudflare cache purged (purge_everything)."
          else
            echo "WARNING: Cloudflare purge did not report success — deploy still OK, edge self-expires." >&2
            echo "${resp}" >&2
          fi

      - name: Notify Ops Bot on failure
        if: failure()
        env:
          OPSBOT_URL: ${{ secrets.OPSBOT_URL }}
          OPSBOT_KEY: ${{ secrets.OPSBOT_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPSBOT_URL:-}" ] || [ -z "${OPSBOT_KEY:-}" ]; then
            echo "Ops Bot secrets not set on this runner — skipping notification"
            exit 0
          fi
          curl -fsS -X POST "${OPSBOT_URL}" \
            -H "Authorization: Bearer ${OPSBOT_KEY}" \
            -H 'Content-Type: application/json' \
            -d "{\"category\":\"fatal\",\"agent\":\"deploy-static-site\",\"body\":\"deploy ${{ inputs.domain }} failed (run ${GITHUB_RUN_ID})\"}" \
            || echo "Ops Bot notification failed (non-fatal)"
